<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIA - Intelligence Artificielle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
        }

        /* ===== MODE PUBLIC ===== */
        .public-mode {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            display: none;
        }

        .public-mode.active {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .aria-header {
            text-align: center;
            padding: 30px 20px;
            border-bottom: 2px solid rgba(148, 163, 184, 0.2);
            margin-bottom: 20px;
        }

        .aria-logo {
            font-size: 3em;
            font-weight: bold;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .aria-subtitle {
            color: #94a3b8;
            font-size: 0.95em;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            padding-bottom: 20px;
            max-height: 60vh;
        }

        .message {
            padding: 15px;
            border-radius: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-msg {
            background: rgba(100, 116, 139, 0.3);
            border-left: 4px solid #60a5fa;
            margin-left: 20px;
        }

        .aria-msg {
            background: rgba(148, 163, 184, 0.1);
            border-left: 4px solid #a78bfa;
            margin-right: 20px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 15px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #a78bfa;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.3;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-10px);
            }
        }

        .input-area {
            display: flex;
            gap: 10px;
            padding: 20px;
            border-top: 2px solid rgba(148, 163, 184, 0.2);
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid rgba(148, 163, 184, 0.3);
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.5);
            color: #e2e8f0;
            font-size: 1em;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #60a5fa;
            background: rgba(15, 23, 42, 0.8);
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-send {
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            color: white;
        }

        .btn-send:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(96, 165, 250, 0.4);
        }

        .btn-login {
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            color: white;
            width: 100%;
            padding: 14px;
            font-size: 1.1em;
        }

        /* ===== MODE ADMIN ===== */
        .admin-mode {
            display: none;
            min-height: 100vh;
        }

        .admin-mode.active {
            display: flex;
            flex-direction: column;
        }

        .admin-header {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            padding: 20px;
            border-bottom: 2px solid rgba(96, 165, 250, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-title {
            font-size: 1.5em;
            font-weight: bold;
            color: #60a5fa;
        }

        .admin-info {
            text-align: right;
            font-size: 0.9em;
            color: #94a3b8;
        }

        .btn-logout {
            background: #ef4444;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            margin-top: 10px;
            width: 100%;
        }

        .admin-content {
            display: flex;
            flex: 1;
            gap: 0;
        }

        .queue-panel {
            flex: 0 0 350px;
            border-right: 2px solid rgba(148, 163, 184, 0.2);
            overflow-y: auto;
            padding: 20px;
        }

        .response-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .queue-item {
            background: rgba(96, 165, 250, 0.1);
            border-left: 4px solid #60a5fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .queue-item.active {
            background: rgba(96, 165, 250, 0.2);
            border-left-color: #a78bfa;
        }

        .queue-item:hover {
            transform: translateX(5px);
        }

        .queue-item-text {
            font-size: 0.9em;
            color: #cbd5e1;
            margin-bottom: 8px;
        }

        .queue-item-time {
            font-size: 0.8em;
            color: #64748b;
        }

        .response-header {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(148, 163, 184, 0.2);
        }

        .question-text {
            font-size: 1.1em;
            color: #e2e8f0;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .admin-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-auto {
            background: linear-gradient(135deg, #10b981, #34d399);
            color: white;
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-auto:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(16, 185, 129, 0.4);
        }

        .btn-auto:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .response-textarea {
            flex: 1;
            padding: 15px;
            background: rgba(15, 23, 42, 0.5);
            border: 2px solid rgba(148, 163, 184, 0.3);
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 1em;
            font-family: inherit;
            resize: none;
            margin-bottom: 15px;
        }

        .response-textarea:focus {
            outline: none;
            border-color: #a78bfa;
        }

        .btn-submit {
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            color: #1f2937;
            font-weight: 600;
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(245, 158, 11, 0.4);
        }

        .empty-state {
            text-align: center;
            color: #64748b;
            padding: 40px 20px;
        }

        /* ===== LOGIN ===== */
        .login-page {
            display: none;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-page.active {
            display: flex;
        }

        .login-box {
            background: rgba(30, 41, 59, 0.8);
            border: 2px solid rgba(96, 165, 250, 0.3);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
        }

        .login-title {
            font-size: 2.5em;
            font-weight: bold;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            margin-bottom: 10px;
        }

        .login-subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e1;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background: rgba(15, 23, 42, 0.5);
            border: 2px solid rgba(148, 163, 184, 0.3);
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 1em;
        }

        .form-group input:focus {
            outline: none;
            border-color: #60a5fa;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: rgba(96, 165, 250, 0.1);
            border: 2px solid rgba(96, 165, 250, 0.3);
            color: #cbd5e1;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            border-color: #60a5fa;
            color: white;
        }

        .error {
            color: #ef4444;
            font-size: 0.9em;
            margin-top: 10px;
        }

        .success {
            color: #10b981;
            font-size: 0.9em;
            margin-top: 10px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .admin-content {
                flex-direction: column;
            }

            .queue-panel {
                flex: 0 0 auto;
                border-right: none;
                border-bottom: 2px solid rgba(148, 163, 184, 0.2);
                max-height: 40vh;
            }

            .aria-header {
                padding: 20px 10px;
            }

            .aria-logo {
                font-size: 2em;
            }

            .login-box {
                padding: 30px 20px;
            }

            .login-title {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>

<!-- ===== LOGIN PAGE ===== -->
<div class="login-page active" id="loginPage">
    <div class="login-box">
        <div class="login-title">ARIA</div>
        <div class="login-subtitle">Intelligence Artificielle Avancée</div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('user')">Utilisateur</button>
            <button class="tab-btn" id="adminTabBtn" style="display:none;" onclick="switchTab('admin')">Admin</button>
        </div>
        
        <!-- ZONE SECRÈTE - 5 CLICS POUR ADMIN -->
        <div id="secretZone" style="height:8px; cursor:pointer; margin-bottom:10px; background: rgba(255,255,255,0.02); border-radius:4px;"></div>

        <!-- USER LOGIN -->
        <div id="userTab">
            <div class="form-group">
                <label>Pseudo</label>
                <input type="text" id="usernamePub" placeholder="Votre pseudo">
            </div>
            <button class="btn-login" onclick="loginUser()">Entrer</button>
            <div id="userError" class="error"></div>
        </div>

        <!-- ADMIN LOGIN -->
        <div id="adminTab" style="display:none;">
            <div class="form-group">
                <label>Code Admin</label>
                <input type="password" id="adminCode" placeholder="Entrez le code">
            </div>
            <div class="form-group">
                <label>Nom (Pseudo Admin)</label>
                <input type="text" id="adminName" placeholder="Votre pseudo">
            </div>
            <button class="btn-login" onclick="loginAdmin()">Se Connecter</button>
            <div id="adminError" class="error"></div>
        </div>
    </div>
</div>

<!-- ===== PUBLIC MODE ===== -->
<div class="public-mode" id="publicMode">
    <div class="aria-header">
        <div class="aria-logo">ARIA</div>
        <div class="aria-subtitle">Intelligence Artificielle Avancée</div>
        <div style="margin-top:15px; color:#64748b; font-size:0.9em;">Connecté en tant que: <strong id="pubUsername"></strong></div>
        <button class="btn-logout" onclick="logout()">Quitter</button>
    </div>

    <div class="chat-container" id="chatContainer"></div>

    <div class="input-area">
        <input type="text" id="questionInput" placeholder="Posez votre question à ARIA..." onkeypress="handleKeyPress(event)">
        <button class="btn-send" onclick="sendQuestion()">Envoyer</button>
    </div>
</div>

<!-- ===== ADMIN MODE ===== -->
<div class="admin-mode" id="adminMode">
    <div class="admin-header">
        <div class="admin-title">⚙️ ARIA Admin Panel</div>
        <div class="admin-info">
            <div>Admin: <strong id="adminUsername"></strong></div>
            <button class="btn-logout" onclick="logout()">Déconnexion</button>
        </div>
    </div>

    <div class="admin-content">
        <!-- QUEUE PANEL -->
        <div class="queue-panel">
            <h3 style="margin-bottom:15px; color:#60a5fa;">📬 File d'attente</h3>
            <div id="queueList"></div>
        </div>

        <!-- RESPONSE PANEL -->
        <div class="response-panel">
            <div id="emptyState" class="empty-state">
                <p>Sélectionnez une question dans la file d'attente</p>
            </div>

            <div id="responseForm" style="display:none;">
                <div class="response-header">
                    <div class="question-text" id="questionDisplay"></div>
                    <div style="font-size:0.85em; color:#64748b;" id="questionUser"></div>
                </div>

                <div class="admin-buttons">
                    <button class="btn-auto" id="autoBtn" onclick="autoRespond()">🤖 Auto-répondre (IA)</button>
                    <button class="btn-auto" style="background: linear-gradient(135deg, #f59e0b, #fbbf24); color: #1f2937;" onclick="manualRespond()">✍️ Je réponds</button>
                </div>

                <textarea class="response-textarea" id="responseText" placeholder="Tapez votre réponse..."></textarea>

                <button class="btn-submit" onclick="submitResponse()">✅ Envoyer la réponse</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ===== STORAGE & STATE =====
    const ADMIN_CODE = 'DavidStudios2026';
    let currentUser = null;
    let currentAdmin = null;
    let admins = JSON.parse(localStorage.getItem('ariaAdmins')) || [];
    let questions = JSON.parse(localStorage.getItem('ariaQuestions')) || [];
    let selectedQuestion = null;

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('[id$="Tab"]').forEach(el => el.style.display = 'none');

        if (tab === 'user') {
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
            document.getElementById('userTab').style.display = 'block';
        } else {
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            document.getElementById('adminTab').style.display = 'block';
        }
    }

    // ===== LOGIN =====
    function loginUser() {
        const username = document.getElementById('usernamePub').value.trim();
        if (!username) {
            document.getElementById('userError').textContent = '❌ Veuillez entrer un pseudo';
            return;
        }

        currentUser = { name: username, role: 'user' };
        localStorage.setItem('currentUser', JSON.stringify(currentUser));
        showPublicMode();
    }

    function loginAdmin() {
        const code = document.getElementById('adminCode').value;
        const name = document.getElementById('adminName').value.trim();

        if (code !== ADMIN_CODE) {
            document.getElementById('adminError').textContent = '❌ Code incorrect';
            return;
        }
        if (!name) {
            document.getElementById('adminError').textContent = '❌ Veuillez entrer un pseudo';
            return;
        }

        if (admins.length >= 10) {
            document.getElementById('adminError').textContent = '❌ Limite d\'admins atteinte';
            return;
        }

        currentAdmin = { id: Date.now(), name, joinedAt: new Date().toLocaleString() };
        admins.push(currentAdmin);
        localStorage.setItem('ariaAdmins', JSON.stringify(admins));
        localStorage.setItem('currentAdmin', JSON.stringify(currentAdmin));
        showAdminMode();
    }

    function logout() {
        currentUser = null;
        currentAdmin = null;
        localStorage.removeItem('currentUser');
        localStorage.removeItem('currentAdmin');
        document.getElementById('loginPage').classList.add('active');
        document.getElementById('publicMode').classList.remove('active');
        document.getElementById('adminMode').classList.remove('active');
        document.getElementById('usernamePub').value = '';
        document.getElementById('adminCode').value = '';
        document.getElementById('adminName').value = '';
    }

    // ===== UI SWITCHING =====
    function showPublicMode() {
        document.getElementById('loginPage').classList.remove('active');
        document.getElementById('publicMode').classList.add('active');
        document.getElementById('pubUsername').textContent = currentUser.name;
        loadChat();
    }

    function showAdminMode() {
        document.getElementById('loginPage').classList.remove('active');
        document.getElementById('adminMode').classList.add('active');
        document.getElementById('adminUsername').textContent = currentAdmin.name;
        loadAdminQueue();
    }

    // ===== PUBLIC MODE FUNCTIONS =====
    function sendQuestion() {
        const input = document.getElementById('questionInput');
        const text = input.value.trim();

        if (!text) return;

        const question = {
            id: Date.now(),
            user: currentUser.name,
            text,
            timestamp: new Date().toLocaleTimeString(),
            answer: null,
            answeredBy: null
        };

        questions.push(question);
        localStorage.setItem('ariaQuestions', JSON.stringify(questions));
        input.value = '';
        loadChat();
        loadAdminQueue();
    }

    function loadChat() {
        const container = document.getElementById('chatContainer');
        container.innerHTML = '';

        questions.forEach(q => {
            const userMsg = document.createElement('div');
            userMsg.className = 'message user-msg';
            userMsg.innerHTML = `<strong>${q.user}:</strong> ${q.text}`;
            container.appendChild(userMsg);

            if (q.answer) {
                setTimeout(() => {
                    const ariaMsg = document.createElement('div');
                    ariaMsg.className = 'message aria-msg';
                    ariaMsg.innerHTML = `<strong>ARIA:</strong> ${q.answer}`;
                    container.appendChild(ariaMsg);
                }, 300);
            }
        });

        container.scrollTop = container.scrollHeight;
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') sendQuestion();
    }

    // ===== ADMIN MODE FUNCTIONS =====
    function loadAdminQueue() {
        const queueList = document.getElementById('queueList');
        const unanswered = questions.filter(q => !q.answer);

        if (unanswered.length === 0) {
            queueList.innerHTML = '<p style="color:#64748b;">✅ Toutes les questions ont des réponses!</p>';
            return;
        }

        queueList.innerHTML = unanswered.map(q => `
            <div class="queue-item ${selectedQuestion?.id === q.id ? 'active' : ''}" onclick="selectQuestion(${q.id})">
                <div class="queue-item-text">${q.text.substring(0, 50)}...</div>
                <div class="queue-item-time">Par: ${q.user} | ${q.timestamp}</div>
            </div>
        `).join('');
    }

    function selectQuestion(id) {
        selectedQuestion = questions.find(q => q.id === id);
        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('responseForm').style.display = 'block';
        document.getElementById('questionDisplay').textContent = selectedQuestion.text;
        document.getElementById('questionUser').textContent = `Question de ${selectedQuestion.user}`;
        document.getElementById('responseText').value = '';
        loadAdminQueue();
    }

    async function autoRespond() {
        if (!selectedQuestion) return;

        const btn = document.getElementById('autoBtn');
        btn.disabled = true;
        btn.textContent = '⏳ Génération en cours...';

        try {
            const response = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: 'claude-sonnet-4-20250514',
                    max_tokens: 1000,
                    messages: [{
                        role: 'user',
                        content: `Tu es ARIA, une intelligence artificielle avancée et professionnelle. Réponds à cette question de manière concise et utile en 2-3 phrases maximum:\n\n${selectedQuestion.text}`
                    }]
                })
            });

            const data = await response.json();
            const answer = data.content[0].text;
            document.getElementById('responseText').value = answer;
            btn.disabled = false;
            btn.textContent = '🤖 Auto-répondre (IA)';
        } catch (error) {
            alert('❌ Erreur API: ' + error.message);
            btn.disabled = false;
            btn.textContent = '🤖 Auto-répondre (IA)';
        }
    }

    function manualRespond() {
        document.getElementById('responseText').focus();
    }

    function submitResponse() {
        const answer = document.getElementById('responseText').value.trim();

        if (!answer) {
            alert('❌ Veuillez entrer une réponse');
            return;
        }

        const questionIndex = questions.findIndex(q => q.id === selectedQuestion.id);
        questions[questionIndex].answer = answer;
        questions[questionIndex].answeredBy = currentAdmin.name;

        localStorage.setItem('ariaQuestions', JSON.stringify(questions));
        selectedQuestion = null;
        document.getElementById('responseForm').style.display = 'none';
        document.getElementById('emptyState').style.display = 'block';
        loadAdminQueue();
        loadChat();

        setTimeout(() => {
            alert('✅ Réponse envoyée avec succès!');
        }, 300);
    }

    // ===== SECRET ACCESS =====
    let secretClickCount = 0;

    function showAdminTab() {
        const adminTabBtn = document.getElementById('adminTabBtn');
        if (adminTabBtn) {
            adminTabBtn.style.display = 'block';
            alert('🔐 Onglet Admin déverrouillé!');
        }
    }

    // ===== INIT =====
    window.addEventListener('load', () => {
        // Détection URL ?admin=true
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('admin') === 'true') {
            showAdminTab();
        }

        // Détection 5 clics sur zone secrète
        const secretZone = document.getElementById('secretZone');
        if (secretZone) {
            secretZone.addEventListener('click', () => {
                secretClickCount++;
                if (secretClickCount === 5) {
                    showAdminTab();
                    secretClickCount = 0;
                }
                setTimeout(() => {
                    if (secretClickCount > 0) secretClickCount--;
                }, 1000);
            });
        }
        const savedUser = localStorage.getItem('currentUser');
        const savedAdmin = localStorage.getItem('currentAdmin');

        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            showPublicMode();
        } else if (savedAdmin) {
            currentAdmin = JSON.parse(savedAdmin);
            showAdminMode();
        }

        setInterval(() => {
            if (currentUser && document.getElementById('publicMode').classList.contains('active')) {
                loadChat();
            }
            if (currentAdmin && document.getElementById('adminMode').classList.contains('active')) {
                loadAdminQueue();
            }
        }, 2000);
    });
</script>

</body>
</html>
